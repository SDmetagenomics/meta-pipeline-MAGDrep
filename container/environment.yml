name: magdrep
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pip
  - snakemake=9.18
  - snakemake-executor-plugin-slurm
  - click=8.1
  - pyyaml=6.0
  # Assembly stats
  - seqkit=2.8
  # Genome quality
  - checkm2=1.0.2
  # CheckM2 and GTDB-Tk both use diamond + prodigal
  - diamond=2.1
  - prodigal=2.6
  # Taxonomy
  - gtdbtk=2.5
  # Dereplication
  - skani=0.2
  - scipy
  # Utilities
  - parallel=20231022
  - pip:
    - -e .
