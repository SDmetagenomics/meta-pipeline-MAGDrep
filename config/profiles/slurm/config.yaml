# SLURM profile for meta-pipeline-MAGQC
#
# Designed for nodes with 64 cores and 512 GB RAM.
#
# Usage:
#   meta-pipeline-MAGQC qc -i mags/ -o results/ --profile slurm

executor: slurm
jobs: 60
keep-going: true
rerun-incomplete: true
printshellcmds: true
latency-wait: 60

default-resources:
  slurm_partition: "normal"
  mem_mb: 64000
  runtime: 120
  nodes: 1
  tasks: 1

set-resources:
  genome_stats:
    runtime: 5
    mem_mb: 4000
  checkm2_batch:
    runtime: 240
    mem_mb: 32000
  gunc_batch:
    runtime: 120
    mem_mb: 32000
  gtdbtk_batch:
    runtime: 480
    mem_mb: 120000
  merge_reports:
    runtime: 10
    mem_mb: 8000
  skani_triangle:
    runtime: 120
    mem_mb: 64000
  dereplicate_cluster:
    runtime: 30
    mem_mb: 16000

group-components: 4
