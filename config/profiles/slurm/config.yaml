# SLURM profile for meta-pipeline-MAGDrep
#
# Resource sizing (threads, pplacer_cpus) comes from the CLI auto-detection
# of your SLURM nodes — it runs `sinfo` to find the dominant node size, or
# honors these config overrides if set:
#   --config cluster_cpus_per_node=64 cluster_mem_gb_per_node=512
#
# The `threads` declared on each rule becomes --cpus-per-task in sbatch,
# so we do NOT set cpus_per_task here; it would override the rule's
# computed value. Memory and runtime are still profile-controlled.
#
# Usage:
#   meta-pipeline-MAGDrep qc -i mags/ -o results/ --profile slurm \
#     --config checkm2_batch_size=200 gtdbtk_batch_size=1000
#
# Tips:
#   - Set $TMPDIR to node-local SSD for faster GTDB-Tk scratch
#     (run_gtdbtk.py detects TMPDIR and passes --scratch_dir automatically)
#   - Override --jobs if your cluster allows more concurrent jobs.

executor: slurm
jobs: 500                 # raise to match your partition's concurrent-job cap
keep-going: true
rerun-incomplete: true
printshellcmds: true
latency-wait: 60

# Default partition is overridden by the CLI at runtime based on
# --slurm-standard-partition (default "normal"). GTDB-Tk is separately
# routed to --slurm-memory-partition if specified.
default-resources:
  mem_mb: 16000
  runtime: 60
  nodes: 1
  tasks: 1
  tmpdir: "/tmp/$SLURM_JOB_ID"   # node-local scratch for intermediates

# Per-rule memory and runtime. We intentionally do NOT set cpus_per_task
# here — the rule's `threads:` value (computed by the CLI from your
# cluster node size) drives --cpus-per-task.
set-resources:
  genome_stats:
    runtime: 5
    mem_mb: 4000

  checkm2_setup_batch:
    runtime: 10
    mem_mb: 2000
  checkm2_batch:
    runtime: 180           # 200 MAGs at 8+ threads
    mem_mb: 16000
  checkm2_merge:
    runtime: 10
    mem_mb: 4000

  gtdbtk_setup_batch:
    runtime: 10
    mem_mb: 2000
  gtdbtk_batch:
    runtime: 720           # classify_wf on 1000 genomes: ~4-8h
    # Memory scales with pplacer_cpus. Default here fits pplacer_cpus=6
    # on a 512 GB node. For larger/smaller nodes, override:
    #   --config gtdbtk.pplacer_cpus=N
    # and set cluster_mem_gb_per_node so pplacer_cpus is sized correctly.
    mem_mb: 400000
  gtdbtk_merge:
    runtime: 10
    mem_mb: 4000

  merge_reports:
    runtime: 15
    mem_mb: 8000
  skani_triangle:
    runtime: 120
    mem_mb: 64000
  dereplicate_cluster:
    runtime: 60
    mem_mb: 16000

# Group rapid rules so they share a SLURM job and avoid queue overhead.
# Format: "GROUP=COMPONENTS" — requires grouping directive on the rule.
# Uncomment and adjust if your rules use group directives.
# group-components:
#   - "fast=4"
