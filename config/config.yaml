# meta-pipeline-MAGDrep default configuration
# Override any value by passing --config key=value on the CLI

# Output directory
outdir: results

# Steps to run (defaults below; add "checkm1" to enable CheckM1 alongside
# or instead of CheckM2).
# Valid values: genome_stats, checkm1, checkm2, gtdbtk, dereplicate
steps:
  - genome_stats
  - checkm2
  - gtdbtk
  - dereplicate

# Compute resources (auto = detect at runtime)
threads_per_job: auto
max_parallel_jobs: auto

# Per-tool thread allocation. When multiple tools (checkm1/checkm2/gtdbtk)
# are active, "auto" splits cores between them so they run concurrently
# (no DAG dependency). Set an integer to override.
checkm1_threads: auto
checkm2_threads: auto

# Global batch size for batch-mode tools (CheckM2, GTDB-Tk).
# Keeps memory bounded for 10k+ datasets.
batch_size: 1000

# Per-tool batch size overrides (null = use batch_size).
# - CheckM1/CheckM2 benefit from smaller batches on cluster/cloud (more parallel jobs)
# - GTDB-Tk benefits from larger batches (amortizes database load)
checkm1_batch_size: null
checkm2_batch_size: null
gtdbtk_batch_size: null

# Input FASTA extensions to discover in the input directory
fasta_extensions:
  - .fasta
  - .fa
  - .fna
  - .fasta.gz
  - .fa.gz
  - .fna.gz

# Database directory (relative to working directory or absolute)
db_dir: databases

# Optional: paths to pre-existing databases (null = expect in db_dir)
checkm1_db_path: null
checkm2_db_path: null
gtdbtk_db_path: null

# Pinned tool and database versions
tool_versions:
  checkm1: "1.2.5"
  checkm2: "1.1.0"
  gtdbtk: "2.5.2"
  skani: "0.3.1"
  seqkit: "2.13.0"
db_versions:
  checkm1: "2015-01-16"  # CheckM1 DB (marker gene HMMs + trees)
  checkm2: "2.0.0"       # CheckM2 diamond DB bundled with checkm2 1.1.0
  gtdbtk: "r226"

# GTDB-Tk specific options
# - threads: auto = split cores with checkm2 when both active, else all
# - pplacer_cpus: auto = scale with available memory (~60 GB per pplacer_cpu for r226)
# - skip_ani_screen: false = run ANI pre-screen (better for near-reference MAGs)
gtdbtk:
  skip_ani_screen: false
  threads: auto
  pplacer_cpus: auto

# Quality filter thresholds
quality_filter:
  high_completeness: 90.0
  high_contamination: 5.0
  medium_completeness: 60.0
  medium_contamination: 10.0
  min_quality_score: 50.0
  default_filter: medium_quality

# Dereplication settings (skani-based species clustering)
# Connected components are detected at 90% ANI, then average-linkage
# clustering is performed independently within each component.
# min_completeness: only genomes above this threshold enter the final
#   representative-selection step (skani still computes ANI on everything).
# Composite score for representative selection:
#   A*Completeness - B*Contamination
#   + C*(Contamination * strain_heterogeneity/100)
#   + D*log10(N50) + E*log10(genome_size)
# Note: CheckM2 doesn't output strain_heterogeneity, so the C term
# is effectively zero unless external data is merged in.
dereplicate:
  ani_threshold: 95.0
  min_af: 10.0
  min_completeness: 60.0
  score_weights:
    A: 1.0    # completeness weight
    B: 5.0    # contamination weight
    C: 1.0    # strain-heterogeneity × contamination weight
    D: 0.5    # log10(N50) weight
    E: 0.0    # log10(genome_size) weight
