name: magdrep
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.9
  - pip
  # Workflow engine
  - snakemake>=8.0
  - snakemake-executor-plugin-slurm
  # Python dependencies
  - click>=8.1
  - pyyaml>=6.0
  - biopython>=1.83
  # Assembly stats
  - seqkit>=2.6
  # Genome quality
  - checkm2>=1.0.2
  # Chimerism detection (GUNC requires diamond and prodigal)
  - prodigal>=2.6
  # Taxonomy
  - gtdbtk>=2.4
  # Dereplication
  - skani>=0.2
  # Testing
  - pytest>=7.0
  - pip:
    - gunc>=1.0.6
    - -e .  # Install meta-pipeline-MAGDrep itself
