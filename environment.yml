name: magdrep
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.12.13
  - pip
  # Workflow engine
  - snakemake=9.16.3
  - snakemake-executor-plugin-slurm=2.6.0
  # Python dependencies
  - click=8.3.2
  - pyyaml=6.0.3
  - biopython=1.87
  # Assembly stats
  - seqkit=2.13.0
  # Genome quality
  - checkm2=1.1.0
  # CheckM2 and GTDB-Tk both use diamond + prodigal
  - diamond=2.1.11
  - prodigal=2.6.3
  # Taxonomy
  - gtdbtk=2.5.2
  - hmmer=3.4
  - pplacer=1.1.alpha22
  - fastani=1.34
  # Dereplication
  - skani=0.3.1
  - scipy=1.17.1
  # Database downloads (required by GTDB-Tk download-db.sh)
  - wget
  # Testing
  - pytest=9.0.3
  - pip:
    - -e .  # Install meta-pipeline-MAGDrep itself
